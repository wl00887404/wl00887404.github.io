<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
    <title>要不要寫成表格</title>
  </head>
  <body data-bs-theme="dark">
    <div class="p-3">
      <table
        class="table table-striped table-hover table-bordered"
        id="data-table"
      >
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="text-secondary" style="font-size: 13px" id="row-badge"></div>
    </div>

    <script>
      // =============================================
      // ▼ 在這裡修改你的二維陣列資料 ▼
      // 第一列 [0] 為表頭，其餘為資料列
      // =============================================

      const getMass = (week) => 84.8 * 0.99 ** week;
      const calcFatRate = (x, fatFreeMass) => ((x - fatFreeMass) / x) * 100;
      const range = (length) => {
        return Array(length)
          .fill()
          .map((_, i) => i);
      };
      const floor = (value, precision) => {
        const c = Math.pow(10, precision);
        return Math.floor(value * c) / c;
      };
      
      const startDate = "2026/5/21";
      const data = range(12).map((i) => {
        const mass = getMass(i);
        const fatRate1 = floor(calcFatRate(mass, 61.7), 2);
        const fatRate2 = floor(calcFatRate(mass, 61.7 + 3.5), 2);

        return [dayjs(startDate).add(i, "day").format("M/D"), floor(mass, 2), fatRate1, fatRate2];
      });

      const TABLE_DATA = [
        ["日期", "體重", "原預估體脂率", "增肌 3.5kg 預估體脂率"],
        ...data,
      ];
      // =============================================
      // ▲ 修改區結束 ▲
      // =============================================

      (function render() {
        const [headers, ...rows] = TABLE_DATA;
        const thead = document.getElementById("table-head");
        const tbody = document.getElementById("table-body");

        const trHead = document.createElement("tr");
        headers.forEach((h) => {
          const th = document.createElement("th");
          th.scope = "col";
          th.textContent = h;
          trHead.appendChild(th);
        });
        thead.appendChild(trHead);

        rows.forEach((row) => {
          const tr = document.createElement("tr");
          row.forEach((cell) => {
            const td = document.createElement("td");
            td.textContent = cell;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });

        document.getElementById("row-badge").textContent =
          rows.length + " 筆資料";
      })();
    </script>
  </body>
</html>
